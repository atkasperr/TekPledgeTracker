{% extends "base.html" %}

{% block title %}Reset password{% endblock %}

{% block content %}
    <section class="auth-card">
        <h2>Set a new password</h2>
        <p class="auth-subtitle">Use the link from your email to open this page, then choose a new password.</p>
        <p id="reset-gate-msg" class="auth-subtitle" style="display: none;"></p>
        <form id="reset-password-form" class="auth-form">
            <label for="reset-new-password">New password</label>
            <input id="reset-new-password" type="password" name="password" placeholder="New password" required minlength="6" autocomplete="new-password">

            <label for="reset-confirm-password">Confirm password</label>
            <input id="reset-confirm-password" type="password" name="confirm" placeholder="Confirm new password" required minlength="6" autocomplete="new-password">

            <button type="submit" id="reset-submit" class="auth-submit">Update password</button>
        </form>
        <p class="auth-footer-text"><a href="/login">Back to login</a></p>
    </section>
{% endblock %}

{% block scripts %}
    <script src="/static/js/reset_password.js"></script>
{% endblock %}
