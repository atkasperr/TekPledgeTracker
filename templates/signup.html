{% extends "base.html" %}

{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="circuit-bg-page">
    <canvas id="circuit-canvas" class="circuit-bg-canvas" aria-hidden="true"></canvas>
    <div class="circuit-bg-content">
    <section class="auth-card auth-card-wide auth-card--on-circuit">
        <div class="auth-logo">
            <img src="/static/img/teklogo.png" alt="TEK logo">
        </div>
        <h2>Create Your Account</h2>
        <p class="auth-subtitle">Sign up to get started with TEK Pledge Tracker.</p>
        <form id="signup-form" class="auth-form">
            <label for="role">Account type</label>
            <select name="role" id="role">
                <option value="pledge" selected>Pledge</option>
                <option value="brother">Brother</option>
            </select>

            <div id="pledge-signup-fields">
                <label for="tasks_per_week">How many times per week do you have to do your task?</label>
                <input id="tasks_per_week" type="number" name="tasks_per_week" min="0" max="50" step="1" placeholder="e.g. 5">
            </div>

            <label for="uniquename">Unique username</label>
            <input id="uniquename" type="text" name="uniquename" placeholder="e.g. jsmith24" required>

            <label for="name">Full name</label>
            <input id="name" type="text" name="name" placeholder="John Smith">

            <label for="email">Email</label>
            <input id="email" type="email" name="email" placeholder="you@example.com" required>

            <label for="password">Password</label>
            <input id="password" type="password" name="password" placeholder="Password (not stored)" required>

            <label for="phone">Phone</label>
            <input id="phone" type="text" name="phone" placeholder="(555) 123-4567">

            <label for="year">Year</label>
            <input id="year" type="number" name="year" placeholder="2026">

            <label for="major">Major</label>
            <input id="major" type="text" name="major" placeholder="Computer Science">

            <label for="pc">PC</label>
            <input id="pc" type="text" name="pc" placeholder="PC name">

            <button type="submit" class="auth-submit">Sign Up</button>
        </form>
        <p class="auth-footer-text">Already have an account? <a href="/login">Log in</a></p>
    </section>
    </div>
</div>
{% endblock %}

{% block scripts %}
    <script src="/static/js/circuit-background.js"></script>
    <script src="/static/js/signup.js"></script>
{% endblock %}
