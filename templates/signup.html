{% extends "base.html" %}

{% block title %}Sign Up{% endblock %}

{% block content %}
    <h2>Sign Up</h2>
    <form id="signup-form">
        <label for="role">Account type:</label>
        <select name="role" id="role">
            <option value="pledge" selected>Pledge</option>
            <option value="brother">Brother</option>
        </select><br>
        <input type="text" name="uniquename" placeholder="Unique username" required><br>
        <input type="text" name="name" placeholder="Full name"><br>
        <input type="email" name="email" placeholder="Email" required><br>
        <input type="password" name="password" placeholder="Password (not stored)" required><br>
        <input type="text" name="phone" placeholder="Phone"><br>
        <input type="number" name="year" placeholder="Year"><br>
        <input type="text" name="major" placeholder="Major"><br>
        <input type="text" name="pc" placeholder="PC"><br>
        <button type="submit">Sign Up</button>
    </form>
{% endblock %}

{% block scripts %}
    <script src="/static/js/signup.js"></script>
{% endblock %}
