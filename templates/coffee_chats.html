{% extends "base.html" %}

{% block title %}Coffee Chats{% endblock %}

{% block content %}
    <h2>Coffee Chats</h2>
    <form id="coffee-chat-form">
        <input type="text" name="pledge_uniq" placeholder="Pledge unique name" required><br>
        <input type="text" name="brother_fullname" placeholder="Brother full name" required><br>
        <input type="date" name="chat_date" required><br>
        <textarea name="description" placeholder="Short description"></textarea><br>
        <button type="submit">Submit Coffee Chat</button>
    </form>
    <div id="coffee-chat-progress">
        <p>Chats done: <span id="chats-done">0</span></p>
        <p>Chats needed this week: <span id="chats-week">0</span></p>
        <p>Chats needed this semester: <span id="chats-semester">0</span></p>
    </div>
{% endblock %}

{% block scripts %}
    <script src="/static/js/coffee_chats.js"></script>
{% endblock %}
