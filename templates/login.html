{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
    <section class="auth-card">
        <h2>Welcome Back</h2>
        <p class="auth-subtitle">Log in to continue to your dashboard.</p>
        <form id="login-form" class="auth-form">
            <label for="login-email">Email</label>
            <input id="login-email" type="email" name="email" placeholder="you@example.com" required>

            <div class="auth-label-row">
                <label for="login-password">Password</label>
                <button type="button" id="forgot-password-btn" class="auth-inline-link-btn">Forgot password?</button>
            </div>
            <input id="login-password" type="password" name="password" placeholder="Enter your password" required>

            <button type="submit" class="auth-submit">Log In</button>
        </form>
        <p class="auth-footer-text">No account yet? <a href="/signup">Create one</a></p>
    </section>
{% endblock %}

{% block scripts %}
    <script src="/static/js/login.js"></script>
{% endblock %}
